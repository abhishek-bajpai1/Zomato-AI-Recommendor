<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zomato AI Recommendor | Discover Your Next Favorite Meal</title>
    <meta name="description" content="AI-powered restaurant recommendations using Zomato data and Groq LLM.">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="/static/styles.css">
</head>

<body>
    <div class="wavy-bg">
        <svg class="waves" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
            viewBox="0 24 150 28" preserveAspectRatio="none" shape-rendering="auto">
            <defs>
                <path id="gentle-wave" d="M-160 44c30 0 58-18 88-18s 58 18 88 18 58-18 88-18 58 18 88 18 v44h-352z" />
            </defs>
            <g class="parallax">
                <use xlink:href="#gentle-wave" x="48" y="0" fill="rgba(226, 55, 68, 0.05)" />
                <use xlink:href="#gentle-wave" x="48" y="3" fill="rgba(226, 55, 68, 0.03)" />
                <use xlink:href="#gentle-wave" x="48" y="5" fill="rgba(226, 55, 68, 0.01)" />
                <use xlink:href="#gentle-wave" x="48" y="7" fill="rgba(226, 55, 68, 0.02)" />
            </g>
        </svg>
    </div>
    <div id="app">
        <div id="loader" class="screen">
            <div class="spinner"></div>
        </div>

        <!-- Login Screen -->
        <div id="login-screen" class="screen hidden">
            <div class="bg-overlay"></div>
            <div class="login-container">
                <div class="login-card">
                    <h1 class="logo">Zomato AI<span> Recommendor</span></h1>
                    <p class="tagline">Discover restaurants you'll love</p>
                    <form id="login-form">
                        <div class="form-group">
                            <label for="email">Email</label>
                            <input type="email" id="email" placeholder="demo@example.com" required>
                        </div>
                        <div class="form-group">
                            <label for="password">Password</label>
                            <input type="password" id="password" placeholder="••••••••" required>
                        </div>
                        <button type="submit" class="btn btn-primary">Sign In</button>
                    </form>
                    <p class="auth-hint">Demo: demo@example.com / password123</p>
                    <div id="login-error" class="error-message"></div>
                </div>
            </div>
        </div>

        <!-- Recommendation Screen -->
        <div id="reco-screen" class="screen hidden">
            <header class="app-header">
                <div class="container">
                    <h1 class="logo">Zomato AI<span> Recommendor</span></h1>
                    <button id="logout-btn" class="btn btn-outline btn-sm">Logout</button>
                </div>
            </header>

            <main class="container">
                <section class="filter-section">
                    <h2>Your Preferences</h2>
                    <div class="filter-grid">
                        <div class="filter-group">
                            <label for="filter-location">Location</label>
                            <select id="filter-location">
                                <option value="">Any Location</option>
                            </select>
                        </div>
                        <div class="filter-group">
                            <label for="filter-cuisine">Cuisine</label>
                            <select id="filter-cuisine">
                                <option value="">Any Cuisine</option>
                            </select>
                        </div>
                        <div class="filter-group">
                            <label>Price Tier</label>
                            <div class="price-chips">
                                <button class="chip" data-value="₹">₹</button>
                                <button class="chip" data-value="₹₹">₹₹</button>
                                <button class="chip" data-value="₹₹₹">₹₹₹</button>
                            </div>
                        </div>
                        <div class="filter-group">
                            <label>Min Rating: <span id="rating-val">0.0</span></label>
                            <input type="range" id="filter-rating" min="0" max="5" step="0.5" value="0">
                        </div>
                    </div>
                    <button id="get-recos-btn" class="btn btn-primary btn-lg">Get Recommendations</button>
                </section>

                <section class="results-section">
                    <div id="results-imagery" class="category-banners">
                        <!-- Dynamic banners based on selection or random -->
                    </div>
                    <div id="results-count" class="results-meta"></div>
                    <div id="results-grid" class="restaurant-grid">
                        <!-- Cards injected here -->
                    </div>
                    <div id="results-placeholder" class="placeholder-state">
                        <div class="placeholder-icon">🍽️</div>
                        <p>Adjust filters and click "Get Recommendations"</p>
                    </div>
                    <div id="results-loading" class="hidden">
                        <div class="skeleton-grid">
                            <div class="skeleton-card"></div>
                            <div class="skeleton-card"></div>
                            <div class="skeleton-card"></div>
                        </div>
                    </div>
                </section>
            </main>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>

</html>
